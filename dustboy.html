<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D AQI Matrix | DustBoy Live</title>

    <!-- Deck.GL and MapLibre -->
    <script src="https://unpkg.com/deck.gl@8.9.0/dist.min.js"></script>
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap"
        rel="stylesheet">

    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: #000;
            overflow: hidden;
            font-family: 'Rajdhani', sans-serif;
            color: #fff;
        }

        #deck-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Glassmorphism UI */
        #hud {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 380px;
            z-index: 10;
            background: rgba(10, 15, 25, 0.75);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 255, 200, 0.2);
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(0, 255, 200, 0.1);
            display: flex;
            flex-direction: column;
            pointer-events: auto;
        }

        .hud-header {
            padding: 20px;
            border-bottom: 1px solid rgba(0, 255, 200, 0.2);
            background: linear-gradient(90deg, rgba(0, 255, 200, 0.1) 0%, transparent 100%);
            border-radius: 12px 12px 0 0;
        }

        .hud-header h1 {
            margin: 0;
            font-family: 'Share Tech Mono', monospace;
            font-size: 1.5rem;
            color: #00ffc8;
            text-shadow: 0 0 10px rgba(0, 255, 200, 0.5);
            letter-spacing: 2px;
        }

        .hud-header p {
            margin: 5px 0 0 0;
            font-size: 0.9rem;
            color: #a0aec0;
        }

        .panel-content {
            padding: 20px;
            flex-grow: 1;
            overflow-y: auto;
            max-height: calc(100vh - 150px);
        }

        .stat-banner {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #333;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-val {
            font-family: 'Share Tech Mono', monospace;
            font-size: 2rem;
            color: #fff;
        }

        .stat-lbl {
            font-size: 0.8rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        h3 {
            font-family: 'Share Tech Mono', monospace;
            font-size: 1.1rem;
            color: #00ffc8;
            border-bottom: 1px dashed #00ffc8;
            padding-bottom: 5px;
            margin-bottom: 15px;
        }

        .ranking-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .ranking-list li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            transition: 0.3s;
        }

        .ranking-list li:hover {
            background: rgba(0, 255, 200, 0.1);
        }

        .rank-loc {
            font-size: 0.95rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 220px;
        }

        .rank-pm {
            font-family: 'Share Tech Mono', monospace;
            font-size: 1.2rem;
            font-weight: bold;
            background: #222;
            padding: 4px 8px;
            border-radius: 4px;
        }

        /* Tooltip */
        #tooltip {
            position: absolute;
            z-index: 100;
            pointer-events: none;
            background: rgba(0, 0, 0, 0.9);
            border: 1px solid #00ffc8;
            color: #fff;
            padding: 10px 15px;
            border-radius: 6px;
            font-family: 'Share Tech Mono', monospace;
            display: none;
            box-shadow: 0 0 15px rgba(0, 255, 200, 0.3);
            transform: translate(-50%, -100%);
            margin-top: -15px;
        }

        .tt-val {
            font-size: 1.5rem;
            color: #ff3366;
        }

        /* Scanning overlay */
        .scanline {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, rgba(255, 255, 255, 0), rgba(255, 255, 255, 0) 50%, rgba(0, 0, 0, 0.2) 50%, rgba(0, 0, 0, 0.2));
            background-size: 100% 4px;
            z-index: 50;
            pointer-events: none;
            opacity: 0.3;
        }

        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Share Tech Mono', monospace;
            font-size: 2rem;
            color: #00ffc8;
            text-shadow: 0 0 20px #00ffc8;
            z-index: 999;
            animation: pulse 1s infinite alternate;
        }

        @keyframes pulse {
            from {
                opacity: 0.5;
            }

            to {
                opacity: 1;
            }
        }
    </style>
</head>

<body>

    <div class="scanline"></div>
    <div class="loading" id="loader">INITIALIZING SATELLITE UPLINK...</div>

    <div id="deck-canvas"></div>
    <div id="tooltip"></div>

    <div id="hud">
        <div class="hud-header">
            <h1>DUSTBOY: MATRIX</h1>
            <p>LIVE NATIONAL PM2.5 TOPOGRAPHY</p>
        </div>
        <div class="panel-content">

            <div class="stat-banner">
                <div class="stat-item">
                    <div class="stat-val" id="total-nodes">0</div>
                    <div class="stat-lbl">ACTIVE SENSORS</div>
                </div>
                <div class="stat-item">
                    <div class="stat-val" id="avg-pm" style="color: #ffcc00;">0</div>
                    <div class="stat-lbl">AVG PM2.5</div>
                </div>
            </div>

            <h3>⚠️ CRITICAL ZONES (TOP 10)</h3>
            <ul class="ranking-list" id="ranking-list">
                <!-- List populated by JS -->
            </ul>
        </div>
    </div>

    <script>
        // Color scale based on AQI PM2.5 standard
        const COLOR_SCALE = [
            [0, [0, 228, 0, 200]],     // Good (Green)
            [25, [255, 255, 0, 200]],   // Moderate (Yellow)
            [37.5, [255, 126, 0, 200]],   // Unhealthy SG (Orange)
            [50, [255, 0, 0, 200]],     // Unhealthy (Red)
            [90, [143, 63, 151, 200]],  // Very Unhealthy (Purple)
            [150, [126, 0, 35, 200]]     // Hazardous (Maroon)
        ];

        function getColor(pm25) {
            for (let i = COLOR_SCALE.length - 1; i >= 0; i--) {
                if (pm25 >= COLOR_SCALE[i][0]) return COLOR_SCALE[i][1];
            }
            return COLOR_SCALE[0][1];
        }

        // Initialize DeckGL Map
        const deckgl = new deck.DeckGL({
            container: 'deck-canvas',
            mapStyle: 'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json',
            initialViewState: {
                longitude: 100.5,
                latitude: 15.8,
                zoom: 5.5,
                minZoom: 4,
                maxZoom: 15,
                pitch: 55,
                bearing: -10
            },
            controller: true,
            layers: []
        });

        // Fetch Live API Data
        const API_URL = "https://open-api.cmuccdc.org/aqic/dustboy";

        async function fetchAirData() {
            try {
                const res = await fetch(API_URL);
                const rawData = await res.json();

                const parsedData = rawData.map(d => ({
                    position: [parseFloat(d.dustboy_lon), parseFloat(d.dustboy_lat)],
                    pm25: parseFloat(d.pm25) || 0,
                    name: d.dustboy_name_en || d.dustboy_name,
                    province: d.dustboy_name.split(',').pop().trim()
                })).filter(d => !isNaN(d.position[0]) && !isNaN(d.position[1]) && d.pm25 > 0);

                renderMap(parsedData);
                updateUI(parsedData);

                document.getElementById('loader').style.display = 'none';

                // Rotate Camera automatically over time for cinematic effect
                let bearing = -10;
                setInterval(() => {
                    bearing = (bearing + 0.1) % 360;
                    deckgl.setProps({
                        initialViewState: { ...deckgl.viewState, bearing }
                    });
                }, 50);

            } catch (err) {
                console.error("API Fetch Error:", err);
                document.getElementById('loader').innerText = "CONNECTION_FAILED";
                document.getElementById('loader').style.color = "#ff0000";
            }
        }

        function renderMap(data) {
            const hexagonLayer = new deck.HexagonLayer({
                id: 'heatmap-hexagon',
                data: data,
                pickable: true,
                extruded: true,
                radius: 4000,
                elevationScale: 100,
                elevationRange: [0, 8000],
                coverage: 0.9,
                getPosition: d => d.position,
                getColorValue: points => {
                    const avg = points.reduce((acc, p) => acc + p.pm25, 0) / points.length;
                    return avg;
                },
                getElevationValue: points => {
                    const avg = points.reduce((acc, p) => acc + p.pm25, 0) / points.length;
                    return avg;
                },
                colorRange: COLOR_SCALE.map(c => c[1]),
                colorDomain: [0, 150],
                onHover: ({ object, x, y }) => {
                    const tooltip = document.getElementById('tooltip');
                    if (object) {
                        const avgPm = (object.elevationValue).toFixed(1);
                        tooltip.style.display = 'block';
                        tooltip.style.left = x + 'px';
                        tooltip.style.top = y + 'px';
                        tooltip.innerHTML = `
                            <div style="font-size: 0.8rem; color: #888;">CLUSTER AVG</div>
                            <div class="tt-val">PM2.5: ${avgPm}</div>
                            <div style="font-size: 0.7rem; margin-top:5px;">${object.points.length} nodes in hex</div>
                            <div style="font-size: 0.7rem; margin-top:5px; color: #00ffc8;">${object.points[0].source.name}</div>
                        `;
                    } else {
                        tooltip.style.display = 'none';
                    }
                },
                transitions: {
                    elevationScale: { duration: 3000, easing: t => t * (2 - t) } // Smooth pop-up animation
                }
            });

            // Start with elevation 0 and animate to full height
            deckgl.setProps({
                layers: [
                    new deck.HexagonLayer({
                        ...hexagonLayer.props,
                        elevationScale: 0
                    })
                ]
            });

            setTimeout(() => {
                deckgl.setProps({ layers: [hexagonLayer] });
            }, 500);
        }

        function updateUI(data) {
            // Count nodes
            document.getElementById('total-nodes').innerText = data.length;

            // Calc Average
            const totalPm = data.reduce((acc, curr) => acc + curr.pm25, 0);
            const avgPm = (totalPm / data.length).toFixed(1);
            document.getElementById('avg-pm').innerText = avgPm;

            // Sort and Top 10
            const sorted = [...data].sort((a, b) => b.pm25 - a.pm25).slice(0, 10);

            const listEl = document.getElementById('ranking-list');
            listEl.innerHTML = '';

            sorted.forEach(s => {
                const li = document.createElement('li');

                // Colorize the badge based on danger level
                const rgba = getColor(s.pm25);
                const colorStr = `rgba(${rgba[0]}, ${rgba[1]}, ${rgba[2]}, 1)`;

                li.innerHTML = `
                    <div class="rank-loc" title="${s.name}">${s.name}</div>
                    <div class="rank-pm" style="color: ${colorStr}; border: 1px solid ${colorStr};">${s.pm25}</div>
                `;
                listEl.appendChild(li);
            });
        }

        // Run
        fetchAirData();

    </script>
</body>

</html>
