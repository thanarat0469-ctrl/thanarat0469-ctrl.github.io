<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Map: Chiang Mai to Phitsanulok</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- PapaParse for CSV reading -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <!-- Google Fonts for better typography -->
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #121212;
            color: #e0e0e0;
            font-family: 'Kanit', sans-serif;
            display: flex;
            flex-direction: column;
        }
        
        header {
            background: linear-gradient(90deg, #1f1c2c 0%, #928DAB 100%);
            padding: 15px 20px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.5);
            z-index: 1000;
        }
        
        header h1 {
            margin: 0;
            font-size: 1.5rem;
            color: #fff;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
            letter-spacing: 1px;
        }

        #map {
            flex-grow: 1;
            width: 100%;
            z-index: 1;
        }

        footer {
            background-color: #0a0a0a;
            padding: 15px;
            text-align: center;
            font-size: 0.95em;
            color: #888;
            border-top: 1px solid #222;
            z-index: 1000;
        }
        
        footer span {
            color: #00e676; /* Accent color for Oracle name */
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        /* Customize Leaflet Dark Popup */
        .leaflet-popup-content-wrapper, .leaflet-popup-tip {
            background-color: #2a2a2a;
            color: #f0f0f0;
            box-shadow: 0 4px 15px rgba(0,0,0,0.8);
        }
        
        .popup-content {
            font-family: 'Kanit', sans-serif;
            font-size: 14px;
            line-height: 1.6;
            margin: 5px 0;
        }
        
        .popup-content strong {
            color: #00e676; 
        }
        
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.8);
            padding: 15px 25px;
            border-radius: 8px;
            z-index: 2000;
            color: #00e676;
            font-size: 1.2rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            border: 1px solid #333;
        }
    </style>
</head>
<body>
    <header>
        <h1>Chiang Mai ➔ Phitsanulok Journey</h1>
    </header>
    
    <div id="loading" class="loading">⏳ โหลดข้อมูล GPS...</div>
    <div id="map"></div>
    
    <footer>
        🤖 แผนที่สร้างโดย Oracle: <span>Antigravity</span>
    </footer>

    <script>
        // กำหนดจุดเริ่มต้นแผนที่
        const map = L.map('map').setView([17.8, 99.5], 8);

        // ใช้ Dark Theme จาก CartoDB
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/">CARTO</a>',
            subdomains: 'abcd',
            maxZoom: 20
        }).addTo(map);

        // URL ข้อมูล CSV ของเรา
        const csvUrl = 'https://raw.githubusercontent.com/Soul-Brews-Studio/two-rivers-oracle/main/ψ/lab/github-pages-workshop/travel-phitsanulok.csv';

        // โหลดข้อมูล CSV อัตโนมัติด้วย PapaParse
        Papa.parse(csvUrl, {
            download: true,
            header: true,
            dynamicTyping: true,
            skipEmptyLines: true,
            complete: function(results) {
                // ปิดป้าย Loading เมื่อโหลดข้อมูลเสร็จ
                document.getElementById('loading').style.display = 'none';
                
                const data = results.data;
                const latlngs = [];

                // วนลูปสร้าง Marker จากข้อมูล CSV
                data.forEach((row, index) => {
                    const lat = parseFloat(row.lat);
                    const lon = parseFloat(row.lon);

                    if (!isNaN(lat) && !isNaN(lon)) {
                        latlngs.push([lat, lon]);

                        // สไตล์ของ Marker (ทำให้จุดโปร่งแสงนิดๆ จะได้ดูเนียนกับพื้นหลังสีเข้ม)
                        let radius = 4;
                        let color = "#00e676"; // สีเขียวสว่าง
                        let fillOpacity = 0.8;
                        
                        // สร้าง Marker
                        const marker = L.circleMarker([lat, lon], {
                            radius: radius,
                            fillColor: color,
                            color: "#fff", // ขอบสีขาว
                            weight: 1,
                            opacity: 0.8,
                            fillOpacity: fillOpacity
                        }).addTo(map);

                        // ดึงข้อมูลแสดงใน Popup
                        const place = row.place || row.locality || 'Unknown Location';
                        let timeStr = 'N/A';
                        if (row.updated) {
                            const d = new Date(row.updated);
                            if(!isNaN(d.getTime())) {
                                timeStr = d.toLocaleString('th-TH');
                            } else {
                                timeStr = row.updated;
                            }
                        }
                        const battery = row.battery != null ? `${row.battery}%` : 'N/A';

                        // กำหนดรูปแบบเนื้อหา Popup
                        const popupContent = `
                            <div class="popup-content">
                                <strong>📍 สถานที่:</strong> ${place}<br>
                                <strong>🕒 เวลา:</strong> ${timeStr}<br>
                                <strong>🔋 แบตเตอรี่:</strong> ${battery}
                            </div>
                        `;
                        marker.bindPopup(popupContent);
                    }
                });

                // ลากเส้นเชื่อมจุดตามลำดับเวลาด้วยสีชมพูนีออนให้เด่นชัด
                if (latlngs.length > 0) {
                    const routeLine = L.polyline(latlngs, {
                        color: '#ff4081', // Neon pink
                        weight: 3,
                        opacity: 0.8,
                        dashArray: '10, 10', // เส้นประ
                        lineJoin: 'round'
                    }).addTo(map);

                    // ซูมและขยับแผนที่ให้พอดีกับเส้นทางทั้งหมดอัตโนมัติ
                    map.fitBounds(routeLine.getBounds(), { padding: [50, 50] });
                }
            },
            error: function(err) {
                document.getElementById('loading').innerHTML = '❌ พบข้อผิดพลาดในการโหลดข้อมูล';
                console.error("CSV Parse Error:", err);
            }
        });
    </script>
</body>
</html>
